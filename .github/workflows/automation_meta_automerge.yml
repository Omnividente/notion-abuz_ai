name: Automation Meta Automerge

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automation-meta-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.draft == false &&
      ((startsWith(github.event.pull_request.head.ref, 'automation-health-meta-') &&
        contains(github.event.pull_request.body || '', 'AUTOMATION_HEALTH_META_TASK')) ||
       (startsWith(github.event.pull_request.head.ref, 'automation-recovery-failed-session-block-') &&
        contains(github.event.pull_request.body || '', 'AUTOMATION_RECOVERY_FAILED_SESSION_BLOCK')) ||
       (startsWith(github.event.pull_request.head.ref, 'automation-circuit-breaker-followup-') &&
        contains(github.event.pull_request.body || '', 'AUTONOMOUS_CIRCUIT_BREAKER_FOLLOWUP_TASK')))

    steps:
      - uses: actions/checkout@v5

      - name: Verify manifest-only automation control-plane PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --name-only | tee /tmp/pr-files.txt
          if [ "$(wc -l < /tmp/pr-files.txt)" -ne 1 ] || ! grep -qx 'agent_tasks.json' /tmp/pr-files.txt; then
            echo "::error::Automation meta PRs may only change agent_tasks.json."
            exit 1
          fi

      - name: Validate autonomous task manifest
        run: python3 scripts/validate_agent_tasks.py agent_tasks.json

      - name: Merge automation meta PR
        env:
          GH_TOKEN: ${{ secrets.PAT || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --delete-branch

      - name: Wake and verify next Jules cycle after automation meta merge
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PAT || github.token }}
        run: |
          set -euo pipefail

          workflow_path="jules_next_task.yml"
          runs_endpoint="repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_path}/runs"
          before_id="$(gh api "${runs_endpoint}?event=workflow_dispatch&per_page=1" --jq '.workflow_runs[0].id // 0')"

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_path}/dispatches" \
            --input <(jq -n '{
              ref: "master",
              inputs: {
                focus: "proxy",
                risk_ceiling: "medium",
                allow_parallel: "false"
              }
            }')

          for attempt in $(seq 1 20); do
            runs_json="$(gh api "${runs_endpoint}?event=workflow_dispatch&per_page=1")"
            run_id="$(jq -r '.workflow_runs[0].id // empty' <<< "${runs_json}")"
            run_status="$(jq -r '.workflow_runs[0].status // empty' <<< "${runs_json}")"
            run_conclusion="$(jq -r '.workflow_runs[0].conclusion // empty' <<< "${runs_json}")"
            run_url="$(jq -r '.workflow_runs[0].html_url // empty' <<< "${runs_json}")"

            if [ -n "${run_id:-}" ] && [ "${run_id}" != "${before_id}" ]; then
              echo "Verified next-task workflow_dispatch run: id=${run_id} status=${run_status} conclusion=${run_conclusion:-none}"
              echo "Run URL: ${run_url}"

              if [ "${run_status}" = "in_progress" ]; then
                exit 0
              fi
              if [ "${run_status}" = "completed" ]; then
                if [ "${run_conclusion}" = "success" ]; then
                  exit 0
                fi
                echo "::error::Dispatched next-task run ${run_id} completed as ${run_conclusion:-unknown}."
                exit 1
              fi
            fi
            sleep 3
          done

          echo "::error::No started workflow_dispatch run appeared within 60 seconds after the accepted dispatch."
          exit 1
