name: Jules - Next Self-Improvement Task

on:
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jules-next-task
  cancel-in-progress: false

jobs:
  next-task:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       (github.event.pull_request.user.login == 'google-jules[bot]' ||
        contains(github.event.pull_request.labels.*.name, 'jules')))

    steps:
      - name: Trigger Google Jules via Official API
        run: |
          PROMPT=$(cat <<'EOF'
          You are improving notion-abuz_ai / notion-manager.

          PROJECT CONTEXT:
          - Language/runtime: Go backend, module "notion-manager".
          - Frontend: React + TypeScript + Vite dashboard in web/.
          - Main binary: ./cmd/notion-manager.
          - Core backend code: internal/proxy, internal/regjob, internal/msalogin, internal/netutil, internal/web.
          - Dashboard static files are embedded through internal/web/dist.
          - Public API compatibility: Anthropic Messages API, OpenAI-compatible endpoints, dashboard/admin APIs.
          - The project manages Notion AI account sessions, quotas, dashboard, reverse proxy, and bulk Microsoft SSO registration.

          TASK LOOP:
          1. Read AGENTS.md, docs/jules_autonomous_loop.md, README.md, docs/api.md, docs/configuration.md, and agent_tasks.json.
          2. Open agent_tasks.json in the repo root.
          3. Find the FIRST task with status "todo".
          4. If there are fewer than 3 todo tasks, add 2-3 new low/medium-risk todo tasks before or after the selected task.
          5. Implement exactly ONE complete task in one PR.
          6. Update agent_tasks.json: set the completed task status to "done".
          7. Add any newly discovered bugs or safe improvements as new todo tasks.
          8. Open ONE pull request.

          VALIDATION COMMANDS:
          - gofmt
          - npm ci inside web/
          - npm run build inside web/
          - copy web/dist to internal/web/dist
          - go vet ./...
          - go test ./...
          - go build -ldflags="-s -w" -o notion-manager ./cmd/notion-manager

          STRICT RULES:
          - Do not ask the user what to do next if agent_tasks.json has safe todo work.
          - Keep PRs small and bounded.
          - Do not modify secrets, accounts, token files, generated logs, binaries, or real user data.
          - Do not modify .github/workflows/** unless the selected task explicitly allows workflow work.
          - Do not add network calls in tests.
          - Do not commit account JSON files, token.txt, config.yaml with secrets, logs, or local runtime artifacts.
          - Use Go tests for backend changes.
          - Use TypeScript/Vite build validation for dashboard changes.
          - For frontend changes, keep code inside web/.
          - For backend proxy/API changes, keep code mostly inside internal/proxy/.
          - For registration changes, keep code mostly inside internal/regjob/ or internal/msalogin/.
          - If a task is high/critical risk, create or refine a task for human review instead of implementing it autonomously.
          EOF
          )

          curl -f 'https://jules.googleapis.com/v1alpha/sessions' \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Goog-Api-Key: ${{ secrets.JULES_API_KEY }}" \
            -d "$(jq -n \
              --arg prompt "$PROMPT" \
              --arg source "sources/github/${{ github.repository }}" \
              '{
                "prompt": $prompt,
                "sourceContext": {"source": $source, "githubRepoContext": {"startingBranch": "master"}},
                "automationMode": "AUTO_CREATE_PR",
                "title": "notion-manager self-improvement task"
              }')"
