name: 2. Execute Leased Jules Task

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "Exact task id selected by the durable reconciler"
        required: true
        type: string
      lease_key:
        description: "Persistent dispatch lease key from automation-state-v2"
        required: true
        type: string
      focus:
        description: "Task focus passed to the Jules prompt renderer"
        required: false
        default: "proxy"
        type: string
      risk_ceiling:
        description: "Maximum accepted task risk"
        required: false
        default: "medium"
        type: choice
        options:
          - low
          - medium
          - high
      allow_parallel:
        description: "Compatibility input; parallel dispatch is intentionally disabled"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
      recovery_pr_number:
        description: "Existing PR number to recover in place; empty for a new task"
        required: false
        default: ""
        type: string
      recovery_pr_head:
        description: "Expected head SHA for the existing recovery PR"
        required: false
        default: ""
        type: string
      recovery_reason:
        description: "Sanitized failed-check context for in-place PR recovery"
        required: false
        default: ""
        type: string

permissions:
  contents: read

# This workflow is an executor, not a scheduler. The durable reconciler creates
# the lease first and both workflows share this single mutation gate.
concurrency:
  group: notion-abuz-autonomy-mutation
  cancel-in-progress: false

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/master' && vars.JULES_LOOP_ENABLED != 'false'
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Validate executor and durable state primitives
        run: |
          python3 -m py_compile \
            .github/scripts/autonomy_state.py \
            .github/scripts/jules_task_executor.py \
            .github/scripts/render-jules-next-task-prompt.py

      - name: Execute exact durable lease
        id: execute
        env:
          GITHUB_API_TOKEN: ${{ secrets.PAT || github.token }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          JULES_API_KEY_BACKUP: ${{ secrets.JULES_API_KEY_BACKUP }}
          RECOVERY_PR_NUMBER: ${{ inputs.recovery_pr_number || '0' }}
          RECOVERY_PR_HEAD: ${{ inputs.recovery_pr_head || '' }}
          RECOVERY_REASON: ${{ inputs.recovery_reason || '' }}
        run: |
          set -euo pipefail
          python3 .github/scripts/jules_task_executor.py \
            --repo "${GITHUB_REPOSITORY}" \
            --manifest agent_tasks.json \
            --task-id "${{ inputs.task_id }}" \
            --lease-key "${{ inputs.lease_key }}" \
            --focus "${{ inputs.focus || 'proxy' }}" \
            --risk-ceiling "${{ inputs.risk_ceiling || 'medium' }}" \
            --recovery-pr-number "${RECOVERY_PR_NUMBER}" \
            --recovery-pr-head "${RECOVERY_PR_HEAD}" \
            --recovery-reason "${RECOVERY_REASON}" \
            --state-branch automation-state-v2 \
            --ledger-path autonomy/ledger.json

      - name: Start bounded observer for the exact Jules session
        env:
          GH_TOKEN: ${{ secrets.PAT || github.token }}
          SESSION_ID: ${{ steps.execute.outputs.session_id }}
        run: |
          set -euo pipefail
          test -n "${SESSION_ID}"
          for attempt in 1 2 3; do
            if gh workflow run jules_session_observer.yml \
              --repo "$GITHUB_REPOSITORY" \
              --ref master \
              -f session_id="${SESSION_ID}" \
              -f stale_minutes=20; then
              exit 0
            fi
            [ "$attempt" -lt 3 ] || exit 1
            sleep "$((attempt * 10))"
          done

      - name: Append executor summary
        if: always()
        env:
          SUMMARY_JSON: ${{ steps.execute.outputs.summary }}
        run: |
          {
            echo "## Leased Jules Task Executor"
            echo
            echo '```json'
            printf '%s\n' "${SUMMARY_JSON:-{}}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
