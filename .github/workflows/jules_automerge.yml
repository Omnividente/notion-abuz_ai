name: 1. Auto-Validate and Merge Jules PRs

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, labeled, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: jules-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-and-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'no-automerge') &&
      !contains(github.event.pull_request.labels.*.name, 'human-review') &&
      (github.event.pull_request.user.login == 'google-jules[bot]' ||
       contains(github.event.pull_request.labels.*.name, 'jules'))

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject protected runtime and workflow paths
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --name-only | tee /tmp/pr-files.txt
          if grep -E '(^|/)(config\.yaml|token\.txt|pass\.txt|.*\.log|notion-manager(\.exe)?$)$|^(data|accounts)/|^\.github/workflows/' /tmp/pr-files.txt; then
            echo "::error::PR changes protected runtime, secret, binary, log, data, account, or workflow files."
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate autonomous task manifest
        run: python3 scripts/validate_agent_tasks.py agent_tasks.json

      - name: Check Go formatting
        run: test -z "$(gofmt -l .)"

      - name: Build dashboard
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Refresh embedded dashboard
        run: |
          rm -rf internal/web/dist
          cp -r web/dist internal/web/dist

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build binary
        run: go build -ldflags="-s -w" -o notion-manager ./cmd/notion-manager

      - name: Merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --delete-branch
