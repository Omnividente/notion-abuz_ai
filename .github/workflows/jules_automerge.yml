name: 1. Auto-Validate and Merge Jules PRs

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, labeled, ready_for_review]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: jules-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  classify-pr:
    runs-on: ubuntu-latest
    outputs:
      autonomous: ${{ steps.classify.outputs.autonomous }}

    steps:
      - uses: actions/checkout@v4

      - name: Classify autonomous PR
        id: classify
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          PR_USER: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          autonomous="$(python3 - <<'PY'
          import json
          import os

          with open("agent_tasks.json", "r", encoding="utf-8") as f:
              task_ids = [task["id"] for task in json.load(f).get("tasks", [])]

          labels = set(json.loads(os.environ.get("PR_LABELS_JSON", "[]")))
          head_ref = os.environ.get("PR_HEAD_REF", "")
          head_repo = os.environ.get("PR_HEAD_REPO", "")
          user = os.environ.get("PR_USER", "")
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          title = os.environ.get("PR_TITLE", "")
          body = os.environ.get("PR_BODY", "")

          is_autonomous = (
              user == "google-jules[bot]"
              or "jules" in labels
              or (
                  head_repo == repo
                  and any(
                      head_ref == task_id
                      or head_ref.startswith(f"{task_id}-")
                      or task_id in title
                      or task_id in body
                      for task_id in task_ids
                  )
              )
          )

          print("true" if is_autonomous else "false")
          PY
          )"

          echo "autonomous=${autonomous}" >> "$GITHUB_OUTPUT"
          echo "Autonomous PR: ${autonomous}"

      - name: Ensure jules label
        if: steps.classify.outputs.autonomous == 'true'
        env:
          GITHUB_API_TOKEN: ${{ secrets.PAT || github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_API_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/labels" \
            -d '{"name":"jules","color":"7057ff","description":"Autonomous Jules PR"}' \
            >/dev/null || true

          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${GITHUB_API_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/labels" \
            -d '{"labels":["jules"]}' \
            >/dev/null

  test-and-merge:
    needs: classify-pr
    runs-on: ubuntu-latest
    environment: live-rdsh
    if: >
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'no-automerge') &&
      !contains(github.event.pull_request.labels.*.name, 'human-review') &&
      needs.classify-pr.outputs.autonomous == 'true'
    env:
      LIVE_NOTION_ACCOUNTS_B64: ${{ secrets.LIVE_NOTION_ACCOUNTS_B64 }}
      SMOKE_MODEL: ${{ vars.LIVE_SMOKE_MODEL || 'opus-4.8' }}
      SMOKE_PORT: "31081"
      SMOKE_API_KEY: "local-live-smoke-key"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject protected runtime and workflow paths
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --name-only | tee /tmp/pr-files.txt
          if grep -E '(^|/)(config\.yaml|token\.txt|pass\.txt|.*\.log|notion-manager(\.exe)?$)$|^(data|accounts)/|^\.github/workflows/' /tmp/pr-files.txt; then
            echo "::error::PR changes protected runtime, secret, binary, log, data, account, or workflow files."
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate autonomous task manifest
        run: python3 scripts/validate_agent_tasks.py agent_tasks.json

      - name: Check Go formatting
        run: test -z "$(gofmt -l .)"

      - name: Build dashboard
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Refresh embedded dashboard
        run: |
          rm -rf internal/web/dist
          cp -r web/dist internal/web/dist

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build binary
        run: go build -ldflags="-s -w" -o notion-manager ./cmd/notion-manager

      - name: RDSH local live smoke
        run: bash .github/scripts/rdsh-local-live-smoke.sh

      - name: Merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --delete-branch
