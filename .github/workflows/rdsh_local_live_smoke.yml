name: RDSH Local Live Smoke

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model id or alias to test against local PR code"
        required: false
        default: "opus-4.8"
        type: string
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, labeled, ready_for_review]

permissions:
  contents: read

concurrency:
  group: rdsh-local-live-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  local-live-smoke:
    runs-on: ubuntu-latest
    environment: live-rdsh
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       (contains(github.event.pull_request.labels.*.name, 'jules') ||
        contains(github.event.pull_request.labels.*.name, 'live-smoke')))
    env:
      LIVE_NOTION_ACCOUNTS_B64: ${{ secrets.LIVE_NOTION_ACCOUNTS_B64 }}
      SMOKE_MODEL: ${{ github.event.inputs.model || vars.LIVE_SMOKE_MODEL || 'opus-4.8' }}
      SMOKE_PORT: "31081"
      SMOKE_API_KEY: "local-live-smoke-key"
      SMOKE_SUMMARY_PATH: "/tmp/local-live-smoke-summary.json"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: RDSH local live smoke
        run: bash .github/scripts/rdsh-local-live-smoke.sh

      - name: Upload sanitized smoke summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-live-smoke-summary
          path: /tmp/local-live-smoke-summary.json
          if-no-files-found: warn
