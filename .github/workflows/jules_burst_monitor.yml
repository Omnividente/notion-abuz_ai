name: 3b. Jules Burst Monitor

on:
  workflow_run:
    workflows: ["2. Trigger Next Proxy Improvement Task"]
    types: [completed]
  workflow_dispatch:
    inputs:
      cycles:
        description: "How many monitor passes to run"
        required: false
        default: "10"
        type: string
      interval_seconds:
        description: "Delay between monitor passes"
        required: false
        default: "30"
        type: string

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: notion-abuz-jules-control-plane
  cancel-in-progress: false

jobs:
  burst-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      vars.JULES_LOOP_ENABLED != 'false' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event_name == 'workflow_run')

    steps:
      - uses: actions/checkout@v5

      - name: Watch and continue fresh Jules session
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          JULES_API_KEY_BACKUP: ${{ secrets.JULES_API_KEY_BACKUP }}
          GITHUB_API_TOKEN: ${{ secrets.PAT || github.token }}
          LOOKBACK_HOURS: "24"
          MIN_USER_REPLY_INTERVAL_MINUTES: "0"
          STALE_AWAITING_FEEDBACK_MINUTES: "10"
          MAX_STALE_AWAITING_FEEDBACK_ESCALATIONS: "1"
          STALE_IN_PROGRESS_MINUTES: "45"
          NO_AGENT_IN_PROGRESS_MINUTES: ${{ vars.JULES_BURST_NO_AGENT_IN_PROGRESS_MINUTES || '4' }}
          NO_AGENT_STALE_IN_PROGRESS_MINUTES: ${{ vars.JULES_BURST_NO_AGENT_STALE_IN_PROGRESS_MINUTES || '5' }}
          MAX_STALE_IN_PROGRESS_ESCALATIONS: "1"
          CYCLES: ${{ inputs.cycles || vars.JULES_BURST_MONITOR_CYCLES || '10' }}
          INTERVAL_SECONDS: ${{ inputs.interval_seconds || vars.JULES_BURST_MONITOR_INTERVAL_SECONDS || '30' }}
        run: |
          set -euo pipefail

          count_open_autonomous_prs() {
            curl -fsS \
              -H "Authorization: Bearer ${GITHUB_API_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pulls?state=open&per_page=100" \
              -o /tmp/open-prs.json

            python3 .github/scripts/count-autonomous-prs.py /tmp/open-prs.json
          }

          get_output() {
            local key="$1"
            local file="$2"
            grep "^${key}=" "$file" | tail -n1 | cut -d= -f2- || true
          }

          classify_burst_status() {
            local active="$1"
            local touched="$2"
            local stale_waiting="$3"
            local stale_in_progress="$4"
            local wait_reason="$5"
            local skipped_stopped="$6"

            if [ "${active:-0}" = "0" ]; then
              echo "idle"
            elif [ "${touched:-0}" != "0" ]; then
              echo "recovery_prompted"
            elif [ "${stale_waiting:-0}" != "0" ] ||
                 [ "${stale_in_progress:-0}" != "0" ] ||
                 [ -n "${wait_reason:-}" ]; then
              echo "recovery_signal_pending"
            elif [ "${skipped_stopped:-0}" != "0" ]; then
              echo "fresh_active_with_stopped_sessions_skipped"
            else
              echo "fresh_active_no_recovery_signal"
            fi
          }

          explain_final_burst_status() {
            local status="$1"
            case "$status" in
              recovery_prompted)
                echo "Active Jules sessions remain after ${cycles} burst passes; a dynamic recovery prompt was sent, so scheduled monitor/router will enforce the retry/delete/block limits."
                ;;
              recovery_signal_pending)
                echo "Active Jules sessions remain after ${cycles} burst passes with recovery signals still present; scheduled monitor/router will continue from the recorded wait_reason and stale-session details."
                ;;
              fresh_active_with_stopped_sessions_skipped)
                echo "Active Jules sessions remain after ${cycles} burst passes; stopped task sessions were ignored and the remaining active session has no stale recovery signal yet."
                ;;
              fresh_active_no_recovery_signal)
                echo "Active Jules sessions remain after ${cycles} burst passes; latest activity is still fresh and no recovery prompt was needed."
                ;;
              *)
                echo "Active Jules sessions remain after ${cycles} burst passes; scheduled monitor/router will continue with the recorded dynamic recovery state."
                ;;
            esac
          }

          dispatch_recovery_retry() {
            local task_id="$1"
            local failed_session_id="$2"
            local recovery_reason="$3"

            body="$(jq -n \
              --arg task_id "$task_id" \
              --arg recovery_session_id "$failed_session_id" \
              --arg recovery_reason "$recovery_reason" \
              '{
                ref: "master",
                inputs: {
                  task_id: $task_id,
                  focus: "proxy",
                  risk_ceiling: "medium",
                  allow_parallel: "false",
                  recovery_session_id: $recovery_session_id,
                  recovery_reason: $recovery_reason
                }
              }')"

            curl -fsS \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_API_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/jules_next_task.yml/dispatches" \
              -d "$body"
          }

          dispatch_next_task() {
            body="$(jq -n \
              '{
                ref: "master",
                inputs: {
                  focus: "proxy",
                  risk_ceiling: "medium",
                  allow_parallel: "false"
                }
              }')"

            curl -fsS \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_API_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/jules_next_task.yml/dispatches" \
              -d "$body"
          }

          cycles="${CYCLES}"
          interval="${INTERVAL_SECONDS}"
          saw_active_sessions="0"

          for i in $(seq 1 "$cycles"); do
            echo "Burst monitor pass ${i}/${cycles}"
            git fetch --prune origin master
            git reset --hard origin/master

            output_file="${RUNNER_TEMP}/jules-monitor-output-${i}.txt"
            : > "$output_file"

            GITHUB_OUTPUT="$output_file" bash .github/scripts/jules-unattended-monitor.sh

            session_ids="$(grep '^session_ids=' "$output_file" | tail -n1 | cut -d= -f2- || true)"
            active_sessions="$(grep '^active_sessions=' "$output_file" | tail -n1 | cut -d= -f2- || echo 0)"
            touched_sessions="$(get_output touched_sessions "$output_file")"
            failed_recovery_action="$(get_output failed_recovery_action "$output_file")"
            failed_task_id="$(get_output failed_task_id "$output_file")"
            failed_session_id="$(get_output failed_session_id "$output_file")"
            failed_sessions="$(get_output failed_sessions "$output_file")"
            failed_recovery_reason="$(get_output failed_recovery_reason "$output_file")"
            stale_waiting_count="$(get_output stale_waiting_count "$output_file")"
            stale_waiting_sessions="$(get_output stale_waiting_sessions "$output_file")"
            stale_in_progress_count="$(get_output stale_in_progress_count "$output_file")"
            stale_in_progress_sessions="$(get_output stale_in_progress_sessions "$output_file")"
            skipped_stopped_count="$(get_output skipped_stopped_count "$output_file")"
            skipped_stopped_sessions="$(get_output skipped_stopped_sessions "$output_file")"
            skipped_inactive_count="$(get_output skipped_inactive_count "$output_file")"
            skipped_inactive_sessions="$(get_output skipped_inactive_sessions "$output_file")"
            skipped_unknown_in_progress_count="$(get_output skipped_unknown_in_progress_count "$output_file")"
            skipped_unknown_in_progress_sessions="$(get_output skipped_unknown_in_progress_sessions "$output_file")"
            wait_reason="$(get_output wait_reason "$output_file")"
            prompt_action="$(get_output prompt_action "$output_file")"
            prompt_task_id="$(get_output prompt_task_id "$output_file")"
            continue_attempts="$(get_output continue_attempts "$output_file")"
            burst_status="$(classify_burst_status \
              "${active_sessions:-0}" \
              "${touched_sessions:-0}" \
              "${stale_waiting_count:-0}" \
              "${stale_in_progress_count:-0}" \
              "${wait_reason:-}" \
              "${skipped_stopped_count:-0}")"
            JULES_SESSION_IDS="$session_ids" python3 .github/scripts/open-ready-jules-prs.py

            open_prs="$(count_open_autonomous_prs)"
            echo "Active Jules sessions: ${active_sessions}"
            echo "Touched Jules sessions: ${touched_sessions:-0}"
            echo "Open autonomous PRs: ${open_prs}"
            echo "Failed recovery action: ${failed_recovery_action:-none}"
            echo "Stale waiting sessions: ${stale_waiting_count:-0} ${stale_waiting_sessions:-}"
            echo "Stale in-progress sessions: ${stale_in_progress_count:-0} ${stale_in_progress_sessions:-}"
            echo "Skipped stopped sessions: ${skipped_stopped_count:-0} ${skipped_stopped_sessions:-}"
            echo "Skipped inactive manifest sessions: ${skipped_inactive_count:-0} ${skipped_inactive_sessions:-}"
            echo "Skipped unknown in-progress sessions: ${skipped_unknown_in_progress_count:-0} ${skipped_unknown_in_progress_sessions:-}"
            echo "Burst status: ${burst_status}"
            echo "Dynamic wait reasons: ${wait_reason:-}"
            echo "Dynamic prompt actions: ${prompt_action:-}"
            echo "Dynamic prompt task ids: ${prompt_task_id:-}"
            echo "Continue attempts: ${continue_attempts:-}"

            if [ "${active_sessions}" != "0" ]; then
              saw_active_sessions="1"
            fi
            if [ "${touched_sessions:-0}" != "0" ]; then
              saw_active_sessions="1"
            fi

            if [ "${open_prs}" != "0" ]; then
              echo "Autonomous PR is open; automerge workflow will take over."
              exit 0
            fi

            if [ "${failed_recovery_action}" = "block" ] && [ -n "${failed_task_id}" ]; then
              echo "Blocking task ${failed_task_id} after repeated failed Jules sessions."
              python3 .github/scripts/block-failed-agent-task.py \
                --manifest agent_tasks.json \
                --task-id "${failed_task_id}" \
                --failed-sessions "${failed_sessions}"
              exit 0
            fi

            if [ "${failed_recovery_action}" = "retry" ] &&
               [ "${active_sessions}" = "0" ] &&
               [ -n "${failed_task_id}" ]; then
              echo "Dispatching recovery retry for failed Jules task ${failed_task_id}."
              dispatch_recovery_retry "${failed_task_id}" "${failed_session_id}" "${failed_recovery_reason}"
              exit 0
            fi

            if [ "${active_sessions}" = "0" ]; then
              if [ "${saw_active_sessions}" = "1" ]; then
                echo "No active Jules sessions remain and no autonomous PR is open; dispatching next task."
                dispatch_next_task
              else
                echo "No active Jules sessions remain; burst monitor can stop."
              fi
              exit 0
            fi

            if [ "$i" -lt "$cycles" ]; then
              sleep "$interval"
            fi
          done

          if [ "${active_sessions:-0}" != "0" ]; then
            explain_final_burst_status "${burst_status:-unknown}"
          fi
