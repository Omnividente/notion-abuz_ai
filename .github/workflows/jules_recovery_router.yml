name: "Retired: Jules Recovery Router"

# Compatibility workflow kept only so old run links remain understandable.
# It has no schedule, workflow_run, pull_request_target, Jules credentials, or
# write permission. Operational recovery belongs exclusively to
# jules_unattended_monitor.yml.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Explain authoritative replacement
        run: |
          echo "Jules Recovery Router is retired."
          echo "Use the scheduled Jules Durable Reconciler in jules_unattended_monitor.yml."

