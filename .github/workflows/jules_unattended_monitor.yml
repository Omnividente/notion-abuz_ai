name: 3. Jules Durable Reconciler

on:
  schedule:
    # Avoid the busiest top-of-hour/common-boundary minute. GitHub documents
    # that scheduled events can be delayed or dropped under scheduler load.
    - cron: "3/5 * * * *"
  workflow_run:
    workflows: ["2. Execute Leased Jules Task"]
    types: [completed]
  workflow_dispatch:
    inputs:
      stale_minutes:
        description: "Minutes without an agent/PR/check progress delta before recovery"
        required: false
        default: "20"
        type: string
      max_recoveries:
        description: "Maximum verified recovery messages without agent progress"
        required: false
        default: "2"
        type: string
  push:
    branches: [master]
    paths:
      - ".github/scripts/autonomy_reconciler.py"
      - ".github/scripts/autonomy_state.py"
      - ".github/scripts/jules_task_executor.py"
      - ".github/scripts/autonomy_reconciler_test.py"
      - ".github/workflows/jules_next_task.yml"
      - ".github/workflows/jules_unattended_monitor.yml"
      - ".github/workflows/jules_recovery_router.yml"
      - ".github/workflows/jules_burst_monitor.yml"
  pull_request:
    branches: [master]
    paths:
      - ".github/scripts/autonomy_reconciler.py"
      - ".github/scripts/autonomy_state.py"
      - ".github/scripts/jules_task_executor.py"
      - ".github/scripts/autonomy_reconciler_test.py"
      - ".github/workflows/jules_next_task.yml"
      - ".github/workflows/jules_unattended_monitor.yml"
      - ".github/workflows/jules_recovery_router.yml"
      - ".github/workflows/jules_burst_monitor.yml"

# PR checks are pure/read-only. The operational job below receives its own
# write permissions only on trusted master events.
permissions:
  contents: read

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Validate durable reconciler without operational credentials
        run: |
          python3 -m py_compile \
            .github/scripts/autonomy_state.py \
            .github/scripts/autonomy_reconciler.py \
            .github/scripts/jules_task_executor.py \
            .github/scripts/autonomy_reconciler_test.py
          python3 -m unittest discover \
            -s .github/scripts \
            -p 'autonomy_reconciler_test.py' \
            -v

  reconcile:
    if: >-
      vars.JULES_LOOP_ENABLED != 'false' &&
      ((github.event_name == 'workflow_run' &&
        github.event.workflow_run.head_branch == 'master') ||
       (github.event_name != 'pull_request' &&
        github.ref == 'refs/heads/master'))
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      actions: write
      checks: read
      contents: write
      issues: write
      pull-requests: write
    concurrency:
      group: notion-abuz-autonomy-mutation
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Validate authoritative reconciler
        run: |
          python3 -m py_compile \
            .github/scripts/autonomy_state.py \
            .github/scripts/autonomy_reconciler.py \
            .github/scripts/jules_task_executor.py
          python3 -m unittest discover \
            -s .github/scripts \
            -p 'autonomy_reconciler_test.py' \
            -v

      - name: Reconcile task, session, PR and checks
        id: reconcile
        env:
          GITHUB_API_TOKEN: ${{ secrets.PAT || github.token }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          JULES_API_KEY_BACKUP: ${{ secrets.JULES_API_KEY_BACKUP }}
        run: |
          set -uo pipefail
          for attempt in 1 2 3; do
            python3 .github/scripts/autonomy_reconciler.py \
              --repo "${GITHUB_REPOSITORY}" \
              --manifest agent_tasks.json \
              --state-branch automation-state-v2 \
              --ledger-path autonomy/ledger.json \
              --stale-minutes "${{ inputs.stale_minutes || '20' }}" \
              --max-recoveries "${{ inputs.max_recoveries || '2' }}" \
              --apply && exit 0
            status=$?
            if [ "$status" -ne 75 ] || [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            delay=$((attempt * 15))
            echo "::warning::Transient API failure; retrying the durable reconcile in ${delay}s (attempt $((attempt + 1))/3)."
            sleep "$delay"
          done

      - name: Append durable reconciler summary
        if: always()
        env:
          SUMMARY_JSON: ${{ steps.reconcile.outputs.summary }}
        run: |
          {
            echo "## Jules Durable Reconciler"
            echo
            echo '```json'
            printf '%s\n' "${SUMMARY_JSON:-{}}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
